<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Pre-warm DNS + TLS to the embed providers and TMDb image CDN so the
         first click on a movie / poster doesn't pay the handshake cost.
         dns-prefetch is a hint; preconnect actually establishes the
         TCP/TLS connection so the iframe load skips ~200-400 ms. -->
    <!-- Embed providers load as cross-origin iframe documents and need
         credentialed connections (cookies / session state) — no crossorigin
         attribute keeps the preconnect in credentialed mode. -->
    <link rel="preconnect" href="https://vidsrc.to" />
    <link rel="preconnect" href="https://www.2embed.cc" />
    <link rel="preconnect" href="https://autoembed.co" />
    <link rel="preconnect" href="https://vidlink.pro" />
    <!-- TMDb image/API fetches go through fetch()/img with no credentials. -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
    <link rel="dns-prefetch" href="https://vidsrc.to" />
    <link rel="dns-prefetch" href="https://www.2embed.cc" />
    <link rel="dns-prefetch" href="https://autoembed.co" />
    <link rel="dns-prefetch" href="https://vidlink.pro" />

    <title>Oono Ent</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
